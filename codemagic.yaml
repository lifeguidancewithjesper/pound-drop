workflows:
  react-native-ios:
    name: Pound Drop iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        certificates:
          - pound-drop-ios-distribution
        provisioning_profiles:
          - pound-drop-app-store-profile
      vars:
        BUNDLE_ID: "com.lifeguidancewithjesper.pounddrop"
        APPLE_TEAM_ID: "8VKM26D99V"
        XCODE_VERSION: "16.1"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          npm install @expo/cli@latest --legacy-peer-deps

      - name: Prebuild iOS project
        script: |
          export CI=1
          rm -rf ios/
          npx expo prebuild --platform ios --non-interactive

      - name: Set up code signing
        script: |
          keychain add-certificates
          xcode-project use-profiles

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS app
        script: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | grep -A 100 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -n1 | xargs)
          xcode-project build-ipa --workspace "$WORKSPACE" --scheme "$SCHEME" --config Release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
