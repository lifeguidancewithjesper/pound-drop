workflows:
  react-native-ios:
    name: Pound Drop iOS - Local CLI Only
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    cache:
      cache_paths:
        - ~/.npm
        - $CM_BUILD_DIR/ios/Pods
        - ~/Library/Caches/CocoaPods
        - ~/Library/Developer/Xcode/DerivedData
    environment:
      ios_signing:
        certificates:
          - pound-drop-ios-distribution
        provisioning_profiles:
          - pound-drop-app-store-profile
      vars:
        BUNDLE_ID: "com.lifeguidancewithjesper.pounddrop"
        APPLE_TEAM_ID: "8VKM26D99V"
        XCODE_VERSION: "16.1"
        NODE_VERSION: "20"
    scripts:
      - name: Setup mobile app - No Global Expo
        script: |
          echo "=== Current directory: $(pwd) ==="
          ls -la
          
          echo "=== Fixing package.json entry point ==="
          cp package-mobile-build.json package.json
          echo "✓ Using correct package.json with index.js entry point"
          
          echo "=== Verifying mobile app files ==="
          test -f App.tsx || { echo "ERROR: App.tsx missing"; exit 1; }
          test -f index.js || { echo "ERROR: index.js missing"; exit 1; }
          test -d src || { echo "ERROR: src directory missing"; exit 1; }
          test -f app.json || { echo "ERROR: app.json missing"; exit 1; }
          echo "✓ All mobile app files verified"
          
          echo "=== Installing dependencies (LOCAL ONLY - NO GLOBAL EXPO) ==="
          export CI=1
          export EXPO_NO_TELEMETRY=1
          
          # Install all dependencies locally - NO global expo install
          npm install --legacy-peer-deps
          
          echo "=== Adding local Expo tools ==="
          npm install expo@latest @expo/cli@latest --save-dev
          
          echo "=== Testing local Expo CLI ==="
          npx expo --version
          
          echo "=== Auto-fixing dependencies ==="
          npx expo install --fix
          
          echo "=== Verifying configuration ==="
          echo "Package.json main:"
          cat package.json | grep '"main"'
          echo "App.json SDK:"
          cat app.json | grep '"sdkVersion"'
          echo "Local Expo CLI ready ✓"

      - name: Prebuild iOS with Local Expo
        script: |
          echo "=== Current directory: $(pwd) ==="
          
          export CI=1
          export NODE_ENV=production
          export EXPO_NO_TELEMETRY=1
          
          echo "=== Verifying Pound Drop assets ==="
          ls -la assets/
          test -f assets/icon.png || { echo "ERROR: Icon missing"; exit 1; }
          test -f assets/adaptive-icon.png || { echo "ERROR: Adaptive icon missing"; exit 1; }
          echo "✓ Assets verified"
          
          echo "=== Cleaning previous builds ==="
          rm -rf ios/
          
          echo "=== Running LOCAL Expo prebuild ==="
          npx expo prebuild --platform ios --clear --no-install || {
            echo "ERROR: Prebuild failed, trying alternative..."
            npx expo prebuild --platform ios --clean || {
              echo "DETAILED ERROR INFO:"
              echo "Package.json:"
              cat package.json
              echo "App.json:"
              cat app.json
              echo "Node modules expo:"
              ls -la node_modules/.bin/ | grep expo || echo "No expo binary found"
              exit 1
            }
          }
          
          echo "=== iOS project created ✓ ==="
          ls -la ios/
          find ios -name "*.xcworkspace" | head -1
          echo "Pound Drop iOS project ready with assets ✓"

      - name: Code signing
        script: |
          echo "=== Code signing ==="
          keychain add-certificates
          xcode-project use-profiles

      - name: CocoaPods
        script: |
          echo "=== CocoaPods in $(pwd)/ios ==="
          cd ios
          rm -rf Pods/ Podfile.lock || true
          pod install --repo-update
          echo "CocoaPods complete ✓"

      - name: Build iOS App
        script: |
          echo "=== Building iOS app ==="
          
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          echo "Workspace: $WORKSPACE"
          
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | sed -n '/Schemes:/,/^$/p' | sed '1d;$d' | grep -v "Pods-" | head -1 | xargs)
          echo "Scheme: $SCHEME"
          
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Release \
            --archive-xcargs "DEVELOPMENT_TEAM=$APPLE_TEAM_ID CODE_SIGN_IDENTITY='iPhone Distribution' CODE_SIGN_STYLE=Manual" \
            --archive-flags "-destination 'generic/platform=iOS'"
          
          echo "=== POUND DROP iOS APP BUILT SUCCESSFULLY! ==="
          ls -la build/ios/ipa/
          echo "Ready for TestFlight! 🎉"

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/build/logs/*.log

    publishing:
      app_store_connect:
        auth: integration
