workflows:
  react-native-ios:
    name: Pound Drop iOS - Complete App Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    cache:
      cache_paths:
        - ~/.npm
        - $CM_BUILD_DIR/mobile-app/pound-drop-fresh/ios/Pods
        - ~/Library/Caches/CocoaPods
        - ~/Library/Developer/Xcode/DerivedData
    environment:
      ios_signing:
        certificates:
          - pound-drop-ios-distribution
        provisioning_profiles:
          - pound-drop-app-store-profile
      vars:
        BUNDLE_ID: "com.lifeguidancewithjesper.pounddrop"
        APPLE_TEAM_ID: "8VKM26D99V"
        XCODE_VERSION: "16.1"
        NODE_VERSION: "20"
    scripts:
      - name: Navigate to complete mobile app
        script: |
          echo "=== Moving to complete mobile app directory ==="
          cd mobile-app/pound-drop-fresh
          echo "Current directory: $(pwd)"
          ls -la
          
          echo "=== Verifying complete mobile app ==="
          test -f App.tsx || { echo "ERROR: App.tsx missing"; exit 1; }
          test -f index.js || { echo "ERROR: index.js missing"; exit 1; }
          test -f package.json || { echo "ERROR: package.json missing"; exit 1; }
          test -f app.json || { echo "ERROR: app.json missing"; exit 1; }
          test -d src || { echo "ERROR: src directory missing"; exit 1; }
          test -d assets || { echo "ERROR: assets directory missing"; exit 1; }
          echo "✓ All mobile app files verified"
          
          echo "=== Configuration Summary ==="
          echo "Package.json main entry:"
          cat package.json | grep '"main"'
          echo "App.json SDK version:"
          cat app.json | grep '"sdkVersion"'
          echo "React version:"
          cat package.json | grep '"react"'
          echo "Bundle identifier:"
          cat app.json | grep '"bundleIdentifier"'

      - name: Install dependencies
        script: |
          cd mobile-app/pound-drop-fresh
          echo "=== Installing dependencies ==="
          
          export CI=1
          export EXPO_NO_TELEMETRY=1
          
          npm install --legacy-peer-deps
          
          echo "=== CRITICAL: Fixing ALL binary permissions ==="
          # Fix permissions on ALL binaries in node_modules/.bin/
          chmod +x node_modules/.bin/* 2>/dev/null || true
          
          echo "=== Verifying expo binary permissions ==="
          ls -la node_modules/.bin/expo
          
          echo "=== Testing expo binary directly ==="
          ./node_modules/.bin/expo --version || npx expo --version || echo "Expo ready"
          
          echo "=== Dependencies installed and permissions fixed ==="

      - name: Prebuild iOS project
        script: |
          cd mobile-app/pound-drop-fresh
          echo "=== Prebuilding iOS project ==="
          
          export CI=1
          export NODE_ENV=production
          export EXPO_NO_TELEMETRY=1
          
          echo "=== Verifying Pound Drop assets ==="
          ls -la assets/
          test -f assets/icon.png || { echo "ERROR: Main icon missing"; exit 1; }
          echo "✓ App assets verified"
          
          echo "=== Cleaning previous builds ==="
          rm -rf ios/
          
          echo "=== Running Expo prebuild ==="
          npx expo prebuild --platform ios --clean || {
            echo "ERROR: Expo prebuild failed"
            echo "Full package.json:"
            cat package.json
            echo "Full app.json:"
            cat app.json
            exit 1
          }
          
          echo "=== iOS project created successfully ==="
          ls -la ios/
          find ios -name "*.xcworkspace" | head -3

      - name: Set up code signing
        script: |
          cd mobile-app/pound-drop-fresh
          echo "=== Setting up code signing ==="
          keychain add-certificates
          xcode-project use-profiles

      - name: Install CocoaPods dependencies
        script: |
          cd mobile-app/pound-drop-fresh/ios
          echo "=== Installing CocoaPods dependencies ==="
          
          rm -rf Pods/ Podfile.lock || true
          pod install --repo-update
          
          echo "✓ CocoaPods installation completed"

      - name: Build iOS app
        script: |
          cd mobile-app/pound-drop-fresh
          echo "=== Building iOS app ==="
          
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          echo "Using workspace: $WORKSPACE"
          
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | sed -n '/Schemes:/,/^$/p' | sed '1d;$d' | grep -v "^Pods-" | head -1 | xargs)
          echo "Building scheme: $SCHEME"
          
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Release \
            --archive-xcargs "DEVELOPMENT_TEAM=$APPLE_TEAM_ID CODE_SIGN_IDENTITY='iPhone Distribution' CODE_SIGN_STYLE=Manual" \
            --archive-flags "-destination 'generic/platform=iOS'"
          
          echo "=== BUILD SUCCESS! ==="
          echo "Your complete Pound Drop app is ready:"
          ls -la build/ios/ipa/
          echo "🎉 Ready for TestFlight submission!"

    artifacts:
      - mobile-app/pound-drop-fresh/build/ios/ipa/*.ipa
      - mobile-app/pound-drop-fresh/ios/build/logs/*.log

    publishing:
      app_store_connect:
        auth: integration
